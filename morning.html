<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FBBF24">
<link rel="icon" type="image/svg+xml" href="morning-icon-192.svg">
<link rel="apple-touch-icon" href="morning-icon-192.svg">
<title>Morning Meds - Cath Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f4f8; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 400px; width: 90%; padding: 32px 24px; text-align: center; }

  .icon { font-size: 48px; margin-bottom: 12px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }

  .status { padding: 16px; border-radius: 12px; margin-bottom: 20px; display: none; }
  .status.show { display: block; }
  .status.recording { background: #fefce8; border: 1px solid #fde68a; }
  .status.done { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .status.error { background: #fef2f2; border: 1px solid #fecaca; }
  .status-text { font-size: 15px; font-weight: 600; }
  .status.recording .status-text { color: #ca8a04; }
  .status.done .status-text { color: #16a34a; }
  .status.error .status-text { color: #dc2626; }

  .med-list { text-align: left; margin-bottom: 24px; }
  .med-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
  .med-item:last-child { border-bottom: none; }
  .med-check { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
  .med-check.pending { border: 2px solid #cbd5e1; background: white; }
  .med-check.done { border: 2px solid #10b981; background: #10b981; color: white; }
  .med-name { font-size: 15px; flex: 1; }
  .med-time { font-size: 12px; color: #94a3b8; }

  .btn { padding: 12px 24px; background: #0d9488; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #0a7860; }
  .btn:disabled { background: #cbd5e1; cursor: not-allowed; }

  .time-display { font-size: 13px; color: #64748b; margin-top: 8px; }
</style>
</head>
<body>

<div class="card">
  <div class="icon">&#x2600;&#xFE0F;</div>
  <h1>Morning Meds</h1>
  <div class="sub">Vyvanse, Valtrex &amp; Levothyroxine</div>

  <div class="status" id="status">
    <div class="status-text" id="status-text"></div>
  </div>

  <div class="med-list" id="med-list">
    <div class="med-item"><div class="med-check pending" id="check-vyvanse"></div><div class="med-name">Vyvanse</div><div class="med-time" id="time-vyvanse"></div></div>
    <div class="med-item"><div class="med-check pending" id="check-valtrex"></div><div class="med-name">Valtrex</div><div class="med-time" id="time-valtrex"></div></div>
    <div class="med-item"><div class="med-check pending" id="check-levo"></div><div class="med-name">Levothyroxine</div><div class="med-time" id="time-levo"></div></div>
  </div>

  <button class="btn" id="record-btn" onclick="recordMeds()">Record Meds</button>

  <div class="time-display" id="time-display"></div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var sb = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
var MORNING_MEDS = ['vyvanse', 'valtrex', 'levothyroxine'];
var checkIds = { 'vyvanse': 'check-vyvanse', 'valtrex': 'check-valtrex', 'levothyroxine': 'check-levo' };
var timeIds = { 'vyvanse': 'time-vyvanse', 'valtrex': 'time-valtrex', 'levothyroxine': 'time-levo' };

var statusEl = document.getElementById('status');
var statusText = document.getElementById('status-text');
var timeDisplay = document.getElementById('time-display');
var recordBtn = document.getElementById('record-btn');

// On load, check if already recorded today
(async function checkTodaysRecords() {
  var now = new Date();
  var today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

  try {
    // Get morning med IDs
    var { data: meds } = await sb.from('habit_meds').select('id, name').eq('freq', 'daily');
    var morningMeds = (meds || []).filter(function(m) {
      return MORNING_MEDS.some(function(mm) { return m.name.toLowerCase().indexOf(mm) !== -1; });
    });

    if (!morningMeds.length) {
      statusEl.className = 'status error show';
      statusText.textContent = 'Could not find morning medications';
      return;
    }

    // Check each med — if all recorded, show done state
    var allRecorded = true;
    var timeStr = now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });

    for (var i = 0; i < morningMeds.length; i++) {
      var med = morningMeds[i];
      var medKey = MORNING_MEDS.find(function(mm) { return med.name.toLowerCase().indexOf(mm) !== -1; });
      var { data: existing } = await sb.from('habit_logs').select('id, created_at').eq('med_id', med.id).eq('date', today);

      if (existing && existing.length > 0) {
        document.getElementById(checkIds[medKey]).className = 'med-check done';
        document.getElementById(checkIds[medKey]).textContent = '\u2713';
        var existingTime = existing[0].created_at ? new Date(existing[0].created_at).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' }) : timeStr;
        document.getElementById(timeIds[medKey]).textContent = existingTime;
      } else {
        allRecorded = false;
      }
    }

    if (allRecorded) {
      statusEl.className = 'status done show';
      statusText.textContent = 'All meds recorded today ✓';
      recordBtn.textContent = 'Already Done';
      recordBtn.disabled = true;
    }
  } catch(e) {
    // Silently fail on load — user can still click Record
  }
})();

window.recordMeds = async function() {
  var now = new Date();
  var today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  var timeStr = now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });

  recordBtn.disabled = true;
  statusEl.className = 'status recording show';
  statusText.textContent = 'Recording...';

  try {
    // Get morning med IDs
    var { data: meds } = await sb.from('habit_meds').select('id, name').eq('freq', 'daily');
    var morningMeds = (meds || []).filter(function(m) {
      return MORNING_MEDS.some(function(mm) { return m.name.toLowerCase().indexOf(mm) !== -1; });
    });

    if (!morningMeds.length) {
      statusEl.className = 'status error show';
      statusText.textContent = 'Could not find morning medications';
      recordBtn.disabled = false;
      return;
    }

    var recorded = 0;
    var errors = [];
    for (var i = 0; i < morningMeds.length; i++) {
      var med = morningMeds[i];
      var medKey = MORNING_MEDS.find(function(mm) { return med.name.toLowerCase().indexOf(mm) !== -1; });

      var { data: existing } = await sb.from('habit_logs').select('id, created_at').eq('med_id', med.id).eq('date', today);

      if (existing && existing.length > 0) {
        var existingTime = existing[0].created_at ? new Date(existing[0].created_at).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' }) : timeStr;
        document.getElementById(checkIds[medKey]).className = 'med-check done';
        document.getElementById(checkIds[medKey]).textContent = '\u2713';
        document.getElementById(timeIds[medKey]).textContent = existingTime;
        recorded++;
      } else {
        var { error } = await sb.from('habit_logs').insert({ med_id: med.id, date: today, created_at: now.toISOString() });
        if (error) {
          errors.push(med.name + ': ' + error.message);
        } else {
          document.getElementById(checkIds[medKey]).className = 'med-check done';
          document.getElementById(checkIds[medKey]).textContent = '\u2713';
          document.getElementById(timeIds[medKey]).textContent = timeStr;
          recorded++;
        }
      }
    }

    if (errors.length > 0) {
      statusEl.className = 'status error show';
      statusText.textContent = 'Failed to save: ' + errors.join(', ');
    } else {
      statusEl.className = 'status done show';
      statusText.textContent = recorded + ' of ' + morningMeds.length + ' recorded ✓';
      timeDisplay.textContent = 'Recorded at ' + timeStr;
      recordBtn.textContent = 'Done';
      recordBtn.disabled = true;
    }

  } catch(e) {
    statusEl.className = 'status error show';
    statusText.textContent = 'Error: ' + (e.message || 'Could not record meds');
    recordBtn.disabled = false;
  }
};
</script>
</body>
</html>
